<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фэнтези Арена</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <h1>⚔️ Фэнтези Арена</h1>
            <div id="coinsDisplay">💰 Загрузка...</div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs" id="mainTabs">
            <button class="tab-btn active" data-tab="games">🎮 Игры</button>
            <button class="tab-btn" data-tab="actions">⚡ Действия</button>
            <button class="tab-btn" data-tab="shop">🛒 Магазин</button>
            <button class="tab-btn" data-tab="business">💼 Бизнес</button>
            <button class="tab-btn" data-tab="profile">👤 Профиль</button>
        </div>

        <!-- КОНТЕНТ -->
        <div id="tabContent"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

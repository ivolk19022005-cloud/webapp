<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фэнтези Арена</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <h1>⚔️ Фэнтези Арена</h1>
            <div id="coinsDisplay">💰 1000 🪙 | 💎 50 | 🎯 Ур. 5 | ⚡ 100/100</div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('games')">🎮 Игры</button>
            <button class="tab-btn" onclick="switchTab('actions')">⚡ Действия</button>
            <button class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
            <button class="tab-btn" onclick="switchTab('business')">💼 Бизнес</button>
            <button class="tab-btn" onclick="switchTab('profile')">👤 Профиль</button>
        </div>

        <!-- КОНТЕНТ -->
        <div id="tabContent"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
